name: Tiny11 ULTRA ISO Builder

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Prepare
        shell: powershell
        run: |
          New-Item -ItemType Directory -Path C:\iso -Force
          New-Item -ItemType Directory -Path C:\tiny11 -Force
          New-Item -ItemType Directory -Path C:\mount -Force

      - name: Download Windows ISO
        shell: powershell
        run: |
          curl.exe -L --fail --retry 5 --retry-delay 10 "${{ secrets.WIN_ISO_URL }}" -o win11.iso

      - name: Verify ISO
        shell: powershell
        run: |
          if (!(Test-Path "win11.iso")) {
            Write-Error "ISO not downloaded!"
            exit 1
          }

          $size = (Get-Item "win11.iso").Length / 1MB
          Write-Host "ISO Size: $size MB"

          if ($size -lt 4000) {
            Write-Error "ISO too small — download failed!"
            exit 1
          }

      - name: Extract ISO
        shell: powershell
        run: |
          Mount-DiskImage -ImagePath (Resolve-Path win11.iso)
          $drive = (Get-DiskImage win11.iso | Get-Volume).DriveLetter
          Copy-Item "$($drive):\*" C:\iso -Recurse
          Dismount-DiskImage win11.iso
          Remove-Item win11.iso

      - name: Clone Tiny11 Builder
        shell: powershell
        run: |
          git clone https://github.com/ntdevlabs/tiny11builder.git C:\tiny11

      - name: Patch Tiny11 Script (AUTO MODE)
        shell: powershell
        run: |
          (Get-Content C:\tiny11\tiny11.ps1) `
          -replace "Read-Host.*", "`$edition = 1" `
          -replace "pause", "" `
          | Set-Content C:\tiny11\tiny11_auto.ps1

      - name: Run Tiny11 Builder
        shell: powershell
        run: |
          powershell -ExecutionPolicy Bypass -File C:\tiny11\tiny11_auto.ps1 `
            -Source "C:\iso" `
            -Destination "C:\tiny11_build"

      - name: Mount Built WIM
        shell: powershell
        run: |
          dism /Mount-Wim /WimFile:C:\tiny11_build\sources\install.wim /index:1 /MountDir:C:\mount

      - name: Apply ULTRA Tweaks + Stores
        shell: powershell
        run: |
          reg load HKLM\OFFLINE_SYSTEM C:\mount\Windows\System32\config\SYSTEM
          reg load HKLM\OFFLINE_SOFTWARE C:\mount\Windows\System32\config\SOFTWARE

          # Disable heavy services
          $services = @(
            "SysMain","WSearch","DiagTrack",
            "wuauserv","WinDefend","Spooler"
          )

          foreach ($s in $services) {
            reg add "HKLM\OFFLINE_SYSTEM\ControlSet001\Services\$s" /v Start /t REG_DWORD /d 4 /f
          }

          # Remove Edge (safe)
          takeown /f "C:\mount\Program Files (x86)\Microsoft\Edge" /r /d y
          icacls "C:\mount\Program Files (x86)\Microsoft\Edge" /grant Administrators:F /t
          Remove-Item "C:\mount\Program Files (x86)\Microsoft\Edge" -Recurse -Force -ErrorAction SilentlyContinue

          # Remove UWP bloat
          $apps = @(
            "Microsoft.Xbox*",
            "MicrosoftTeams",
            "Microsoft.Bing*",
            "Microsoft.GetHelp",
            "Microsoft.Getstarted",
            "Microsoft.MicrosoftOfficeHub",
            "Microsoft.People",
            "Microsoft.ZuneMusic",
            "Microsoft.ZuneVideo"
          )

          foreach ($app in $apps) {
            dism /Image:C:\mount /Get-ProvisionedAppxPackages |
            Where-Object { $_ -like "*$app*" } |
            ForEach-Object {
              dism /Image:C:\mount /Remove-ProvisionedAppxPackage /PackageName:$_
            }
          }

          # -----------------------------
          # DOWNLOAD STORES
          # -----------------------------

          Invoke-WebRequest https://aka.ms/getwinget -OutFile C:\mount\Windows\Temp\winget.appxbundle

          Invoke-WebRequest https://github.com/marticliment/UniGetUI/releases/latest/download/UniGetUI.Installer.exe -OutFile C:\mount\Windows\Temp\store.exe

          # Scoop installer
          Set-Content C:\mount\Windows\Temp\install_scoop.cmd @"
          powershell -Command "Set-ExecutionPolicy RemoteSigned -Scope CurrentUser; iwr get.scoop.sh -useb | iex"
          "@

          # Chocolatey installer
          Set-Content C:\mount\Windows\Temp\install_choco.cmd @"
          powershell -Command "Set-ExecutionPolicy Bypass -Scope Process; iwr https://chocolatey.org/install.ps1 | iex"
          "@

          # -----------------------------
          # FIRST BOOT SCRIPT
          # -----------------------------

          New-Item -ItemType Directory -Path C:\mount\Windows\Setup\Scripts -Force

          Set-Content C:\mount\Windows\Setup\Scripts\SetupComplete.cmd @"
          @echo off

          powershell -ExecutionPolicy Bypass -Command "Add-AppxPackage C:\Windows\Temp\winget.appxbundle"

          call C:\Windows\Temp\install_scoop.cmd
          call C:\Windows\Temp\install_choco.cmd

          start /wait C:\Windows\Temp\store.exe /silent

          exit
          "@

          reg unload HKLM\OFFLINE_SYSTEM
          reg unload HKLM\OFFLINE_SOFTWARE

      - name: Commit WIM
        shell: powershell
        run: |
          dism /Unmount-Wim /MountDir:C:\mount /Commit

      - name: Create Bootable ISO
        shell: powershell
        run: |
          oscdimg -m -o -u2 -udfver102 `
          -bootdata:2#p0,e,bC:\iso\boot\etfsboot.com#pEF,e,bC:\iso\efi\microsoft\boot\efisys.bin `
          C:\tiny11_build C:\tiny11_extreme.iso

      - name: Compress ISO
        shell: powershell
        run: |
          Compress-Archive C:\tiny11_extreme.iso tiny11_extreme.zip

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tiny11-ultra
          path: tiny11_extreme.zip
