name: Tiny11 ULTRA ISO Builder

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Prepare
        shell: powershell
        run: |
          New-Item -ItemType Directory -Path C:\iso -Force
          New-Item -ItemType Directory -Path C:\tiny11 -Force
          New-Item -ItemType Directory -Path C:\mount -Force
          New-Item -ItemType Directory -Path C:\tiny11_build -Force

      - name: Download Windows ISO
        shell: powershell
        run: |
          curl.exe -L --fail --retry 5 --retry-delay 10 "${{ secrets.WIN_ISO_URL }}" -o win11.iso

      - name: Extract ISO
        shell: powershell
        run: |
          $isoPath = (Resolve-Path "win11.iso").Path

          # Mount ISO
          $disk = Mount-DiskImage -ImagePath $isoPath -PassThru
          Start-Sleep -Seconds 5

          # Get drive letter
          $volume = $disk | Get-Volume
          $driveLetter = $volume.DriveLetter + ":"

          Write-Host "Mounted ISO at $driveLetter"

          # Copy files
          Copy-Item "$driveLetter\*" C:\iso -Recurse -Force

          # Dismount
          Dismount-DiskImage -ImagePath $isoPath
          Remove-Item $isoPath -Force

      - name: Clone Tiny11 Builder
        shell: powershell
        run: |
          git clone https://github.com/ntdevlabs/tiny11builder.git C:\tiny11

      - name: Patch Tiny11 Script (AUTO MODE)
        shell: powershell
        run: |
          (Get-Content C:\tiny11\tiny11maker.ps1) `
          -replace "Read-Host.*", "`$edition = 1" `
          -replace "pause", "" `
          | Set-Content C:\tiny11\tiny11_auto.ps1

      - name: Run Tiny11 Builder
        shell: powershell
        run: |
          powershell -ExecutionPolicy Bypass -File C:\tiny11\tiny11_auto.ps1 `
            -Source "C:\iso" `
            -Destination "C:\tiny11_build"

      - name: Mount Built WIM
        shell: powershell
        run: |
          dism /Mount-Wim /WimFile:C:\tiny11_build\sources\install.wim /index:1 /MountDir:C:\mount

      - name: Apply ULTRA Tweaks
        shell: powershell
        run: |
          reg load HKLM\OFFLINE_SYSTEM C:\mount\Windows\System32\config\SYSTEM
          reg load HKLM\OFFLINE_SOFTWARE C:\mount\Windows\System32\config\SOFTWARE

          # Disable heavy services
          $services = @(
            "SysMain","WSearch","DiagTrack",
            "wuauserv","WinDefend","Spooler"
          )

          foreach ($s in $services) {
            reg add "HKLM\OFFLINE_SYSTEM\ControlSet001\Services\$s" /v Start /t REG_DWORD /d 4 /f
          }

          # Remove Edge (safe way)
          Remove-Item -Recurse -Force C:\mount\Program Files (x86)\Microsoft\Edge -ErrorAction SilentlyContinue
          Remove-Item -Recurse -Force C:\mount\Program Files\Microsoft\Edge -ErrorAction SilentlyContinue

          # Disable telemetry
          reg add "HKLM\OFFLINE_SOFTWARE\Policies\Microsoft\Windows\DataCollection" /v AllowTelemetry /t REG_DWORD /d 0 /f

          # Unload registry
          reg unload HKLM\OFFLINE_SYSTEM
          reg unload HKLM\OFFLINE_SOFTWARE

      - name: Unmount WIM
        shell: powershell
        run: |
          dism /Unmount-Wim /MountDir:C:\mount /Commit

      - name: Create ISO
        shell: powershell
        run: |
          oscdimg -m -o -u2 -udfver102 `
            C:\tiny11_build `
            C:\tiny11_ultra.iso

      - name: Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: tiny11-ultra-iso
          path: C:\tiny11_ultra.iso
